<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Video Capture</title>
        <style>
            /* Remove any system borders on Windows 11 */
            html, body {
                margin: 0;
                padding: 0;
                border: none;
                outline: none;
                background: transparent;
                -webkit-app-region: drag;
            }

            body {
                overflow: hidden;
                font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", "Oxygen",
                    "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            }

            /* Windows specific border removal */
            * {
                box-sizing: border-box;
            }

            .interactive {
                -webkit-app-region: no-drag;
            }
            @keyframes recording-pulse {
                0%, 100% {
                    opacity: 0.3;
                    transform: scale(1);
                }
                50% {
                    opacity: 0.8;
                    transform: scale(1.1);
                }
            }
            .recording-active {
                animation: recording-pulse 2s infinite !important;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            #reconnecting-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.65);
                z-index: 900;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 14px;
                -webkit-app-region: no-drag;
            }
            #reconnecting-spinner {
                width: 36px;
                height: 36px;
                border: 4px solid rgba(255, 255, 255, 0.25);
                border-top-color: #ffffff;
                border-radius: 50%;
                animation: spin 0.9s linear infinite;
            }
            #reconnecting-label {
                color: #ffffff;
                font-size: 13px;
                font-weight: 500;
                letter-spacing: 0.4px;
                opacity: 0.9;
            }
            /* Ensure Toastify toasts are clickable */
            .toastify {
                -webkit-app-region: no-drag;
            }
            #key-overlay {
                position: fixed;
                bottom: 110px;
                left: 50%;
                width: 0;
                height: 0;
                z-index: 2000;
                pointer-events: none;
            }
            @keyframes key-float {
                0%   { opacity: 1; transform: translateX(-50%) translateY(0)     scale(1);   }
                10%  { opacity: 1;                                                            }
                100% { opacity: 0; transform: translateX(-50%) translateY(-80vh) scale(0.7); }
            }
            .key-indicator {
                position: absolute;
                left: 0;
                bottom: 0;
                white-space: nowrap;
                background: rgba(0, 0, 0, 0.72);
                color: #fff;
                border: 2px solid rgba(255, 255, 255, 0.45);
                border-radius: 10px;
                padding: 8px 18px;
                font-size: 26px;
                font-weight: bold;
                font-family: monospace;
                animation: key-float 1.5s ease-out forwards;
            }
        </style>
        <link href="../node_modules/toastify-js/src/toastify.css" rel="stylesheet" />
    </head>

    <body>
        <video
            id="video-player"
            style="
                width: 480px;
                height: 270px;
                object-fit: contain;
                border-style: solid;
                border-width: 0.1px;
                border-color: rgba(0, 0, 0, 0.1);
                border-radius: 5px;
                display: block;
                position: fixed;
                top: 5px;
                left: 5px;
            "
            autoplay
            playsinlines
        ></video>
        <img id="overlay-image" style="opacity: 0" />
        <div id="reconnecting-overlay">
            <div id="reconnecting-spinner"></div>
            <div id="reconnecting-label">Reconnecting capture device...</div>
        </div>
        <div
            id="recording-indicator"
            style="
                position: fixed;
                top: 25px;
                left: 30px;
                width: 12px;
                height: 12px;
                background-color: #ff4444;
                border-radius: 50%;
                opacity: 0;
                transition: opacity 0.3s;
                z-index: 1001;
                box-shadow: 0 0 8px rgba(255, 68, 68, 0.6);
            "
        ></div>
        <button
            id="settings-button"
            style="opacity: 0"
            class="interactive"
            alt="show settings"
            title="Show Settings"
        >⋯</button>
        <div id="device-label" style="opacity: 0"></div>
        <div id="key-overlay"></div>
        <script src="../node_modules/toastify-js/src/toastify.js"></script>
        <script src="render.js"></script>
    </body>
</html>
